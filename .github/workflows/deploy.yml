name: Deploy WordPress Plugin

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SVN
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Checkout WordPress SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          svn checkout https://plugins.svn.wordpress.org/dashclean svn \
          --username "$SVN_USERNAME" \
          --password "$SVN_PASSWORD" \
          --no-auth-cache \
          --non-interactive

      - name: Deploy plugin
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          VERSION=${GITHUB_REF_NAME}

          echo "Deploying version $VERSION"

          # Copy plugin files to trunk
          rsync -av --delete \
            --exclude '.git*' \
            --exclude '.github' \
            --exclude 'wp-assets' \
            ./ svn/trunk/

          # Copy WordPress plugin directory assets
          rsync -av ./wp-assets/ svn/assets/

          cd svn

          svn add --force . --auto-props --parents --depth infinity -q
          svn status | grep '^!' | sed 's/^! *//' | xargs -r svn rm

          echo "Committing trunk changes..."
          svn commit -m "Deploy version $VERSION to trunk" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --no-auth-cache \
            --non-interactive

          echo "Creating tag $VERSION..."
          svn copy trunk tags/$VERSION

          svn commit -m "Tagging version $VERSION" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --no-auth-cache \
            --non-interactive
